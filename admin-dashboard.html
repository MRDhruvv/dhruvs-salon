<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Dashboard - Dhruv's Salon</title>
	<style>
		* { box-sizing: border-box; }
		body {
			font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
			margin: 0;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding: 20px;
		}
		.dashboard {
			max-width: 1200px;
			margin: 0 auto;
		}
		header {
			background: white;
			padding: 24px;
			border-radius: 12px;
			margin-bottom: 24px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.1);
		}
		header h1 {
			margin: 0 0 8px;
			color: #333;
			font-size: 28px;
		}
		header p {
			margin: 0;
			color: #666;
			font-size: 13px;
		}
		.stats {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 16px;
			margin-bottom: 24px;
		}
		.stat-card {
			background: white;
			padding: 20px;
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.1);
			text-align: center;
		}
		.stat-card .number {
			font-size: 32px;
			font-weight: 800;
			color: #667eea;
			margin: 0;
		}
		.stat-card .label {
			color: #666;
			font-size: 12px;
			margin: 8px 0 0;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}
		.appointments {
			background: white;
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 10px 30px rgba(0,0,0,0.1);
		}
		.appointments-header {
			padding: 24px;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
		}
		.appointments-header h2 {
			margin: 0;
			font-size: 20px;
		}
		.table {
			width: 100%;
			border-collapse: collapse;
		}
		.table th {
			background: #f8f9fa;
			padding: 16px;
			text-align: left;
			font-weight: 600;
			color: #333;
			font-size: 12px;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			border-bottom: 1px solid #e0e0e0;
		}
		.table td {
			padding: 16px;
			border-bottom: 1px solid #e0e0e0;
		}
		.table tr:hover {
			background: #f8f9fa;
		}
		.status {
			display: inline-block;
			padding: 6px 12px;
			border-radius: 20px;
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}
		.status.pending {
			background: #fff3cd;
			color: #856404;
		}
		.status.confirmed {
			background: #d4edda;
			color: #155724;
		}
		.status.completed {
			background: #d1ecf1;
			color: #0c5460;
		}
		.empty {
			padding: 40px 20px;
			text-align: center;
			color: #999;
		}
		.loading {
			text-align: center;
			padding: 20px;
			color: #667eea;
		}
		.error {
			background: #f8d7da;
			color: #721c24;
			padding: 16px;
			border-radius: 8px;
			margin-bottom: 16px;
		}
		.success {
			background: #d4edda;
			color: #155724;
			padding: 16px;
			border-radius: 8px;
			margin-bottom: 16px;
		}
		.refresh-btn {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 8px;
			cursor: pointer;
			font-weight: 600;
			font-size: 12px;
			transition: transform 0.2s ease;
			margin-left: auto;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.refresh-btn:hover {
			transform: scale(1.05);
		}
		.header-actions {
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-wrap: wrap;
			gap: 16px;
		}
		.connection-status {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 12px;
		}
		.status-indicator {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: #4caf50;
		}
		.status-indicator.offline {
			background: #f44336;
		}
		@media (max-width: 768px) {
			.table {
				font-size: 12px;
			}
			.table th, .table td {
				padding: 12px 8px;
			}
			header h1 {
				font-size: 20px;
			}
			.stats {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="dashboard">
		<header>
			<div class="header-actions">
				<div>
					<h1>📊 Admin Dashboard</h1>
					<p>Real-time salon appointment notifications</p>
				</div>
				<div style="display: flex; gap: 16px; align-items: center;">
					<div class="connection-status">
						<span class="status-indicator" id="statusIndicator"></span>
						<span id="connectionStatus">Connecting...</span>
					</div>
					<button class="refresh-btn" onclick="loadAppointments()">
						🔄 Refresh
					</button>
				</div>
			</div>
		</header>

		<div class="stats">
			<div class="stat-card">
				<p class="number" id="totalCount">0</p>
				<p class="label">Total Bookings</p>
			</div>
			<div class="stat-card">
				<p class="number" id="pendingCount">0</p>
				<p class="label">Pending</p>
			</div>
			<div class="stat-card">
				<p class="number" id="confirmedCount">0</p>
				<p class="label">Confirmed</p>
			</div>
			<div class="stat-card">
				<p class="number" id="todayCount">0</p>
				<p class="label">Today's Bookings</p>
			</div>
		</div>

		<div class="appointments">
			<div class="appointments-header">
				<h2>📅 Latest Appointments</h2>
			</div>
			<div id="appointmentsContainer">
				<div class="loading">Loading appointments...</div>
			</div>
		</div>
	</div>

	<script>
		const API_URL = window.location.hostname === 'localhost' 
			? 'http://localhost:5001'
			: 'https://your-backend-url.com'; // Will be updated during deployment

		let refreshInterval;

		function updateConnectionStatus(connected) {
			const indicator = document.getElementById('statusIndicator');
			const status = document.getElementById('connectionStatus');
			if (connected) {
				indicator.classList.remove('offline');
				status.textContent = '✓ Connected';
			} else {
				indicator.classList.add('offline');
				status.textContent = '✗ Offline';
			}
		}

		async function loadAppointments() {
			try {
				updateConnectionStatus(true);
				const response = await fetch(`${API_URL}/api/appointments`);
				
				if (!response.ok) throw new Error('Failed to load appointments');
				
				const data = await response.json();
				const appointments = data.appointments || [];

				// Update stats
				document.getElementById('totalCount').textContent = appointments.length;
				document.getElementById('pendingCount').textContent = 
					appointments.filter(a => a.status === 'pending').length;
				document.getElementById('confirmedCount').textContent = 
					appointments.filter(a => a.status === 'confirmed').length;

				const today = new Date().toISOString().split('T')[0];
				document.getElementById('todayCount').textContent = 
					appointments.filter(a => a.date === today).length;

				// Render appointments table
				if (appointments.length === 0) {
					document.getElementById('appointmentsContainer').innerHTML = 
						'<div class="empty">No appointments yet. Book one to get started! 🎯</div>';
					return;
				}

				const html = `
					<table class="table">
						<thead>
							<tr>
								<th>Name</th>
								<th>Phone</th>
								<th>Date</th>
								<th>Time</th>
								<th>Services</th>
								<th>Amount</th>
								<th>Status</th>
								<th>Booked</th>
							</tr>
						</thead>
						<tbody>
							${appointments.map(apt => `
								<tr>
									<td><strong>${apt.name}</strong></td>
									<td>${apt.phone}</td>
									<td>${apt.date}</td>
									<td>${apt.time}</td>
									<td>${apt.services}</td>
									<td><strong>₹${Number(apt.total).toFixed(2)}</strong></td>
									<td><span class="status ${apt.status}">${apt.status}</span></td>
									<td>${new Date(apt.created_at).toLocaleDateString()}</td>
								</tr>
							`).join('')}
						</tbody>
					</table>
				`;
				document.getElementById('appointmentsContainer').innerHTML = html;

			} catch (error) {
				console.error('Error loading appointments:', error);
				updateConnectionStatus(false);
				document.getElementById('appointmentsContainer').innerHTML = 
					`<div class="error">⚠️ Error loading appointments. Make sure backend is running at ${API_URL}</div>`;
			}
		}

		// Load appointments on page load
		loadAppointments();

		// Auto-refresh every 5 seconds
		refreshInterval = setInterval(loadAppointments, 5000);

		// Clean up on page unload
		window.addEventListener('beforeunload', () => {
			clearInterval(refreshInterval);
		});
	</script>
</body>
</html>
